name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore EAPlaymateGroup.csproj

      - name: Build
        run: dotnet build EAPlaymateGroup.csproj --configuration Release --no-restore --nologo

      - name: Publish
        run: dotnet publish EAPlaymateGroup.csproj --configuration Release --no-build --output artifacts/publish

      - name: Verify production secrets are excluded
        shell: pwsh
        run: |
          $forbidden = @(
            "artifacts/publish/appsettings.Development.json",
            "artifacts/publish/appsettings.Production.json"
          )
          foreach ($path in $forbidden) {
            if (Test-Path -LiteralPath $path) {
              throw "Publish output must not contain $path"
            }
          }

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: ea-playmate-group-publish
          path: artifacts/publish
          if-no-files-found: error
          retention-days: 14

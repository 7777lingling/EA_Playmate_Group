name: CI/CD

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish
        run: dotnet publish EAPlaymateGroup.csproj --configuration Release --output artifacts/publish

      - name: Verify production secrets are excluded
        shell: pwsh
        run: |
          $forbidden = @(
            "artifacts/publish/appsettings.Development.json",
            "artifacts/publish/appsettings.Production.json"
          )
          foreach ($path in $forbidden) {
            if (Test-Path -LiteralPath $path) {
              throw "Publish output must not contain $path"
            }
          }

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: ea-playmate-group-iis-${{ github.sha }}
          path: artifacts/publish
          if-no-files-found: error
          retention-days: 7

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on:
      - self-hosted
      - Windows
      - X64
      - iis-production
    environment: webCI/CD_Variables
    env:
      IIS_SITE_NAME: ${{ vars.IIS_SITE_NAME || 'EAPlaymateGroup' }}
      IIS_HEALTH_URL: ${{ vars.IIS_HEALTH_URL || 'http://localhost:8081/api/health' }}

    steps:
      - name: Checkout deployment script
        uses: actions/checkout@v4

      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: ea-playmate-group-iis-${{ github.sha }}
          path: artifacts/deploy

      - name: Debug Variables
        shell: powershell
        run: |
          Write-Host "SiteName=[$env:IIS_SITE_NAME]"
          Write-Host "HealthUrl=[$env:IIS_HEALTH_URL]"
          if ([string]::IsNullOrWhiteSpace($env:IIS_SITE_NAME)) {
            throw "IIS_SITE_NAME is empty."
          }
          if ([string]::IsNullOrWhiteSpace($env:IIS_HEALTH_URL)) {
            throw "IIS_HEALTH_URL is empty."
          }

      - name: Deploy to IIS
        shell: powershell
        run: |
          .\Scripts\Deploy-Iis.ps1 `
            -SiteName "$env:IIS_SITE_NAME" `
            -PackagePath ".\artifacts\deploy" `
            -HealthUrl "$env:IIS_HEALTH_URL"
